{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <h1 class="h1">Admin Login</h1>
  <p class="muted">Sign in to manage listings, services, and account settings.</p>

  <div class="card mt-4 max-w-[520px]">
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      {% if form.errors %}
        <div class="card border-rose-200 bg-rose-50 mb-3">
          <strong>Login failed.</strong>
          <div class="muted mt-1.5">Check your username and password.</div>
        </div>
      {% endif %}

      <input type="hidden" name="next" value="{{ next }}" />

      <div class="mb-2.5">
        <label for="id_username" class="muted">Username</label>
      </div>
      <div class="row mb-2.5">
        <input id="id_username" type="text" name="username" placeholder="Enter your username" autocomplete="username" required />
      </div>

      <div class="mb-2.5">
        <label for="id_password" class="muted">Password</label>
      </div>
      <div class="row mb-3">
        <input id="id_password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>

      <button class="btn primary block" type="submit">Login</button>
    </form>
  </div>
{% endblock %}
