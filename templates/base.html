<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Reactive Notes{% endblock %}</title>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <meta name="csrf-token" content="{{ csrf_token }}" />
    <script>
      document.addEventListener("htmx:configRequest", (event) => {
        const token = document.querySelector('meta[name="csrf-token"]')?.getAttribute("content");
        if (token) event.detail.headers["X-CSRFToken"] = token;
      });
    </script>

    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; }
      .container { max-width: 800px; margin: 0 auto; padding: 24px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
      .row { display: flex; gap: 8px; align-items: center; }
      input[type=text] { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
      button { padding: 10px 12px; border-radius: 8px; border: 1px solid #bbb; background: #f7f7f7; cursor: pointer; }
      ul { list-style: none; padding: 0; margin: 12px 0 0; }
      li { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .muted { color: #666; font-size: 14px; }
      .done { text-decoration: line-through; color: #777; }
      .actions { display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
