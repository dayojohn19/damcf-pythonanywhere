<div class="mt-3">
  <div><strong>Request sent.</strong></div>
  <div class="muted">We’ll contact you soon about <strong>{{ property.title }}</strong>.</div>

  <div class="actions mt-2">
    <button class="btn" type="button"
            hx-get="{% url 'property_book' property.id %}?clear=1"
            hx-target="#booking-{{ property.id }}"
            hx-swap="innerHTML"
          hx-select="div"
            hx-push-url="false"
            hx-disinherit="*">Close</button>
  </div>
</div>
