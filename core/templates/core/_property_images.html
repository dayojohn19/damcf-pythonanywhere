<div id="property-images">
  <div class="muted mb-2.5">{{ property.images.all|length }} uploaded photos</div>

  <div class="grid grid-cols-[repeat(auto-fill,minmax(160px,1fr))]">
    {% for img in property.images.all %}
      <div class="card p-2.5">
        <img src="{{ img.image.url }}" alt="Photo" loading="lazy" class="w-full h-[120px] object-cover rounded-lg border border-slate-200" />
        <form class="mt-2.5"
              hx-post="{% url 'property_image_delete' img.id %}"
              hx-target="#property-images"
              hx-swap="outerHTML">
          {% csrf_token %}
          <button class="btn danger" type="submit">Delete photo</button>
        </form>
      </div>
    {% empty %}
      <div class="muted">No photos uploaded yet.</div>
    {% endfor %}
  </div>
</div>
