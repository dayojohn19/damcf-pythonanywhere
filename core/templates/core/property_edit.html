{% extends "base.html" %}

{% block title %}Edit Property{% endblock %}

{% block content %}
  <h1>Edit Property</h1>
  <p class="muted"><a href="{% url 'listings' %}">← Back to listings</a></p>

  <div class="card mb-4">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row mb-2.5">
        <input type="text" name="title" value="{{ property.title }}" placeholder="Title" autocomplete="off" />
        <select name="status" class="select">
          {% for value,label in status_choices %}
            <option value="{{ value }}" {% if property.status == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row mb-2.5">
        <input type="text" name="price" value="{% if property.price %}{{ property.price }}{% endif %}" placeholder="Price (e.g. 350000)" autocomplete="off" />
        <input type="text" name="address" value="{{ property.address }}" placeholder="Address" autocomplete="off" />
      </div>

      <div class="row mb-2.5">
        <select name="municipality" class="select flex-1">
          <option value="">Municipality (optional)</option>
          {% for m in municipalities %}
            <option value="{{ m.id }}" {% if property.municipality_id == m.id %}selected{% endif %}>{{ m.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-2.5">
        <textarea name="description" placeholder="Description" class="textarea">{{ property.description }}</textarea>
      </div>

      <button type="submit">Save</button>
    </form>
  </div>

  <div class="card">
    <h3 class="mt-0">Photos</h3>

    <form class="row"
          hx-post="{% url 'property_edit' property.id %}"
          hx-target="#property-images"
          hx-swap="outerHTML"
          hx-encoding="multipart/form-data"
          enctype="multipart/form-data">
      {% csrf_token %}
      <input type="file" name="images" multiple />
      <button type="submit">Upload</button>
    </form>

    <div class="mt-3.5">
      {% include "core/_property_images.html" %}
    </div>
  </div>
{% endblock %}
