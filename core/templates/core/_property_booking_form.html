<div class="mt-3">
  <div class="muted">Request a booking for <strong>{{ property.title }}</strong></div>

  <div class="mt-2" id="booking-email-feedback-{{ property.id }}" hidden></div>

  {% if errors %}
    <div class="mt-2">
      {% for e in errors %}
        <div class="muted">{{ e }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <form id="booking-form-{{ property.id }}" method="post"
        action="{% url 'property_book' property.id %}"
        hx-post="{% url 'property_book' property.id %}"
        hx-target="#booking-{{ property.id }}"
      hx-swap="innerHTML"
      hx-select="div"
      hx-push-url="false"
      hx-disinherit="*">
    {% csrf_token %}

    <input type="hidden" name="property_title" value="{{ property.title }}">
    <input type="hidden" name="property_url" value="{% url 'property_detail' property.id %}">

    <input type="hidden" name="from_name" value="">
    <input type="hidden" name="sender_contact" value="">
    <input type="hidden" name="booking_inquiry" value="">
    <input type="hidden" name="to_name" value="Real Estate Team">
    <input type="hidden" name="to_email" value="">
    <input type="hidden" name="reply_to" value="">

    <div class="row gap-2 mt-2" style="flex-wrap: wrap;">
      <input type="text" name="name" placeholder="Your name" value="{{ name|default:'' }}" required>
      <input type="email" name="email" placeholder="Your email" value="{{ email|default:'' }}" required>
      <input type="date" name="requested_date" value="{{ requested_date|default:'' }}" required>
    </div>

    <div class="mt-2">
      <textarea name="message" rows="3" placeholder="Optional message">{{ message|default:'' }}</textarea>
    </div>

    <div class="actions mt-2">
      <!-- <button class="btn" type="submit">Send request</button> -->
      <!-- <button class="btn" type="submit" name="send_whatsapp" value="1">Send via WhatsApp</button> -->
      <a class="btn" hx-boost="false"
         href="{% url 'contact' %}?service={{ property.title|urlencode }}&property={{ property.id }}"
         onclick="return (function(a){
           try {
             const form = document.getElementById('booking-form-{{ property.id }}');
             const href = a.getAttribute('href') || '';
             const base = href.split('?')[0] || href;
             const qs = new URLSearchParams();
             qs.set('service', '{{ property.title|escapejs }}');
             qs.set('property', '{{ property.id }}');
             if (form) {
               const nameEl = form.querySelector('[name=name]');
               const emailEl = form.querySelector('[name=email]');
               const dateEl = form.querySelector('[name=requested_date]');
               const msgEl = form.querySelector('[name=message]');
               const name = (nameEl && 'value' in nameEl) ? String(nameEl.value || '').trim() : '';
               const email = (emailEl && 'value' in emailEl) ? String(emailEl.value || '').trim() : '';
               const requestedDate = (dateEl && 'value' in dateEl) ? String(dateEl.value || '').trim() : '';
               const message = (msgEl && 'value' in msgEl) ? String(msgEl.value || '').trim() : '';
               if (name) qs.set('name', name);
               if (email) qs.set('email', email);
               if (requestedDate) qs.set('requested_date', requestedDate);
               if (message) qs.set('message', message);
             }
             window.location.href = base + '?' + qs.toString();
             return false;
           } catch (e) {
             return true;
           }
         })(this);">Send via Email</a>
      <button class="btn" type="button"
              hx-get="{% url 'property_book' property.id %}?clear=1"
              hx-target="#booking-{{ property.id }}"
              hx-swap="innerHTML"
              hx-select="div"
              hx-push-url="false"
              hx-disinherit="*">Cancel</button>
    </div>
  </form>
</div>
